<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner Pro</title>
    <link rel="stylesheet" href="estilos.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#121212">
</head>
<body>

    <header class="app-header">
        <h2>// LAB. ESCÁNER</h2>
        <div class="indicador-estado">SISTEMA EN LÍNEA</div>
    </header>

    <div class="top-controls">
        <input type="file" id="inputImagen" accept="image/*" multiple>
        <button id="btnRotar" class="btn-icon">[ 90º ]</button>
    </div>

    <div class="visor-container">
        <canvas id="lienzoApp"></canvas>
    </div>

    <div id="panelRecorte" class="panel-control">
        <p class="instruccion-tecnica">ESTABLECER ÁREA DE ESCANEO</p>
        <button id="btnModoLibro" class="btn-secondary" style="border-style: dashed;">[ MODO: PLANO (4 PUNTOS) ]</button>
        <button id="btnEscanear" class="btn-primary">INICIAR RECORTE</button>
    </div>

    <div id="panelFiltros" class="panel-control" style="display: none;">
        <label class="toggle-tecnico">
            <input type="checkbox" id="checkBlancoNegro">
            <span>MODO DOCUMENTO (B/N)</span>
        </label>

        <div id="controlesFiltro" class="parametro-control" style="display: none;">
            <label for="rangoSensibilidad">UMBRAL DE SENSIBILIDAD [GRAFITO <-> TINTA]</label>
            <input type="range" id="rangoSensibilidad" min="2" max="25" value="15" step="1">
        </div>

        <div class="btn-group">
            <button id="btnVolver" class="btn-secondary">< RECALIBRAR</button>
            <button id="btnConfirmar" class="btn-primary">CONFIRMAR PROCESO ></button>
        </div>
    </div>

   <div class="panel-control gestion-documento">
        <h3 class="titulo-seccion">LOTE DE SALIDA: <span id="contadorPaginas" class="contador-tech">0</span> PÁGS</h3>

        <div id="vistasPrevias" class="galeria-lote"></div>

        <div class="parametro-control">
            <label for="formatoPdf">FORMATO DE COMPILACIÓN:</label>
            <select id="formatoPdf" class="input-tecnico">
                <option value="a4">ESTÁNDAR A4 (ISO 216)</option>
                <option value="dinamico">DIMENSIONES RELATIVAS</option>
            </select>
        </div>

        <button id="btnGuardarPagina" style="display: none;">Añadir y Siguiente</button>
        <button id="btnCompartirImagen" class="btn-action" disabled>EXPORTAR IMAGEN (JPG)</button>
        <button id="btnCompartirPDF" class="btn-primary" disabled>COMPILAR Y EXPORTAR (PDF)</button>
        <button id="btnLimpiar" class="btn-danger">PURGAR MEMORIA</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script async src="https://docs.opencv.org/4.8.0/opencv.js" type="text/javascript"></script>
    <script src="app.js"></script>
</body>
</html>
