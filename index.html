<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner</title>
    <link rel="stylesheet" href="estilos.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
</head>
<body>

    <h2>Escáner Web</h2>

    <div style="display: flex; gap: 10px; margin-bottom: 15px;">
    <input type="file" id="inputImagen" accept="image/*" multiple>
    <button id="btnRotar" style="min-width: 60px; padding: 10px;">↻ 90º</button>
    </div>

    <canvas id="lienzoApp"></canvas>

    <div class="controles">
            <label style="font-weight: bold; justify-content: center; margin-bottom: 10px;">
                <input type="checkbox" id="checkBlancoNegro"> Blanco y Negro
            </label>

            <div id="controlesFiltro" style="display: none; width: 100%; margin-bottom: 15px;">
                <label for="rangoSensibilidad" style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 5px; justify-content: center;">
                    Sensibilidad (Izquierda: Lápiz | Derecha: Tinta oscura)
                </label>
                <input type="range" id="rangoSensibilidad" min="2" max="25" value="15" step="1" style="width: 100%; accent-color: var(--accent);">
            </div>

            <button id="btnEscanear">Recortar y Escanear</button>
        </div>

   <div class="gestion-documento" style="margin-top: 20px; padding: 15px; border-top: 2px dashed #ccc;">
    <h3>Documento Actual: <span id="contadorPaginas">0</span> páginas</h3>
    <div id="vistasPrevias" style="display: flex; gap: 10px; justify-content: center; margin-bottom: 15px; overflow-x: auto; padding: 10px;"></div>

    <div style="margin-bottom: 15px;">
        <label for="formatoPdf" style="font-weight: bold;">Formato del PDF final: </label>
        <select id="formatoPdf">
            <option value="a4">Tamaño Estándar A4 (Recomendado)</option>
            <option value="dinamico">Tamaño Original Recortado</option>
        </select>
    </div>

    <button id="btnGuardarPagina" disabled>Añadir y Siguiente</button>
    <button id="btnCompartirImagen" disabled>Compartir Imagen Actual 📤</button>
    <button id="btnCompartirPDF" disabled>Crear y Compartir PDF 📤</button>
    <button id="btnLimpiar" style="background-color: #ffdddd; color: #cc0000;">Borrar Todo</button>
</div>
<a href="https://www.flaticon.es/iconos-gratis/escaner-3d" title="escaner-3d iconos">Escaner-3d iconos creados por Muhammad_Usman - Flaticon</a>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script async src="https://docs.opencv.org/4.8.0/opencv.js" type="text/javascript"></script>
    <script src="app.js"></script>
</body>
</html>
